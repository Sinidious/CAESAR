name: Bug report
description: Something is broken or behaves unexpectedly.
title: "bug: <short summary>"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please do **not** include secrets, tokens,
        or personal data in logs or screenshots.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I asked Praetor to dim the kitchen lights, …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: I expected the lights to dim to 30%.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal, ordered steps. Include configuration or fixtures.
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: CAESAR version / commit SHA
      placeholder: "v0.0.0 or 7f3a1d2"
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Python version, deployment shape (bare metal, container, etc.).
      render: text
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / audit-log excerpt
      description: Paste relevant logs. Scrub tokens and IPs.
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmations
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I have removed secrets / tokens / personal data from this report.
          required: true
