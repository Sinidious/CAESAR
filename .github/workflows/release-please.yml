name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          # Use a fine-scoped PAT instead of GITHUB_TOKEN so the
          # release PR's downstream workflows (lint / test / typecheck)
          # fire automatically. GitHub's anti-recursion rule blocks
          # workflow triggers from GITHUB_TOKEN-authored events; a PAT
          # bypasses that and is the documented release-please workflow.
          # Falls back to GITHUB_TOKEN when the secret is not set so
          # contributor forks don't break.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # SR-011: build wheel + sdist and attach Sigstore build-provenance
  # attestations to the GitHub Release so operators can verify the
  # artifacts came from this repo's CI:
  #   gh attestation verify caesar-0.X.0-py3-none-any.whl \
  #       --repo Sinidious/CAESAR
  build-and-attest:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # upload artifacts to the release
      id-token: write  # OIDC token for Sigstore signing
      attestations: write  # record attestation in the repo's attestation list
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Generate build-provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*"

      - name: Upload artifacts to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" dist/* \
            --repo "${{ github.repository }}" \
            --clobber

  # ADR-0029: build + push multi-arch container image to ghcr.io on
  # every release. Reuses the SR-011 Sigstore attestation flow so
  # operators can verify the image came from this repo's CI:
  #   gh attestation verify oci://ghcr.io/sinidious/caesar:0.X.0 \
  #       --repo Sinidious/CAESAR
  build-and-push-image:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push to ghcr.io
      id-token: write   # Sigstore OIDC
      attestations: write
    steps:
      - uses: actions/checkout@v6

      - name: Derive image tag from release-please tag
        id: tag
        run: |
          # release-please tags look like "v0.4.0"; strip the leading "v"
          # so the image tag is "0.4.0".
          raw_tag='${{ needs.release-please.outputs.tag_name }}'
          version="${raw_tag#v}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/sinidious/caesar:${{ steps.tag.outputs.version }}
            ghcr.io/sinidious/caesar:latest
          # docker/build-push-action returns an image digest we can
          # attest. The same digest covers every platform manifest in
          # the index, so a single attestation signs the multi-arch
          # release.
          provenance: false  # we attest via attest-build-provenance below

      - name: Generate Sigstore image attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/sinidious/caesar
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
