name: auto-merge-on-approval

# When a maintainer (or any reviewer with write access) approves a PR,
# enable GitHub's auto-merge so the PR squash-merges itself the moment
# required status checks turn green. No second click required.
#
# This does NOT bypass branch protection: the PR still needs a passing
# CI suite and any other rules configured on `main`. It just removes
# the manual "click Merge" step after approval.

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: github.event.review.state == 'approved' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"
