name: dependency-review

# Block PRs that introduce dependencies with known vulnerabilities or
# disallowed licenses. Runs on every PR; surfaces a comment if anything
# fails.

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: dependency-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: dependency-review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Review dependencies
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          # PolyForm Noncommercial 1.0.0 is incompatible with copyleft
          # licenses we ship. Permit only permissive families plus MPL.
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, MPL-2.0, Python-2.0, 0BSD, Unlicense, CC0-1.0
