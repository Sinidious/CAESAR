version: 2
updates:
  # GitHub Actions: one consolidated weekly PR for all action bumps.
  # Majors land in their own PR (and need an approval) so they get a
  # closer look.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    labels: ["deps", "ci"]
    commit-message:
      prefix: "ci"
      include: scope
    groups:
      github-actions:
        applies-to: version-updates
        update-types: ["minor", "patch"]
        patterns: ["*"]

  # Python dependencies (pyproject.toml).
  # - dev-dependencies: minor/patch bumps for the `dev` and `docs`
  #   extras, grouped into one weekly PR.
  # - security: any security advisory across all deps gets coalesced
  #   into one PR.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    labels: ["deps", "python"]
    commit-message:
      prefix: "build"
      include: scope
    groups:
      dev-dependencies:
        applies-to: version-updates
        update-types: ["minor", "patch"]
        dependency-type: "development"
      security:
        applies-to: security-updates
        patterns: ["*"]
