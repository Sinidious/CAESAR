version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    labels: ["deps", "ci"]
    commit-message:
      prefix: "ci"
      include: scope

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    labels: ["deps", "python"]
    commit-message:
      prefix: "build"
      include: scope
    groups:
      dev-dependencies:
        dependency-type: "development"
