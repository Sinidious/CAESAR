site_name: CAESAR
site_description: Self-hosted homelab AI assistant — Praetor brain + Legion of workers.
site_url: https://sinidious.github.io/CAESAR/
repo_url: https://github.com/Sinidious/CAESAR
repo_name: Sinidious/CAESAR
edit_uri: edit/main/docs/
copyright: PolyForm Noncommercial 1.0.0 — CAESAR contributors.

docs_dir: docs
strict: true

exclude_docs: |
  adr/0000-template.md

theme:
  name: material
  features:
    - content.code.copy
    - content.action.edit
    - content.action.view
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Quickstart: QUICKSTART.md
  - Architecture: ARCHITECTURE.md
  - Roadmap: ROADMAP.md
  - Operations: OPERATIONS.md
  - Run a worker on another box: RUN-A-WORKER.md
  - Add your own tool: ADD-YOUR-OWN-TOOL.md
  - Proactive CAESAR: PROACTIVE-CAESAR.md
  - Configuration: CONFIGURATION.md
  - Picking a model: PICKING-A-MODEL.md
  - Security model: SECURITY-MODEL.md
  - Security review: SECURITY-REVIEW.md
  - Glossary: GLOSSARY.md
  - ADRs:
      - Index: adr/README.md
      - "0001 — Record architecture decisions": adr/0001-record-architecture-decisions.md
      - "0002 — License under PolyForm Noncommercial 1.0.0": adr/0002-license-polyform-nc.md
      - "0003 — Require a CLA": adr/0003-require-cla.md
      - "0004 — Conventional Commits + release-please": adr/0004-conventional-commits-and-release-please.md
      - "0005 — Python 3.11 runtime": adr/0005-python-3-11-runtime.md
      - "0006 — Praetor on FastAPI + LangGraph": adr/0006-praetor-runtime.md
      - "0007 — Home Assistant bridge": adr/0007-home-assistant-bridge.md
      - "0008 — Voice via client-side transcription": adr/0008-voice-wyoming.md
      - "0009 — NATS message bus": adr/0009-message-bus-nats.md
      - "0010 — Hybrid memory store": adr/0010-memory-hybrid.md
      - "0011 — LLM Gateway": adr/0011-llm-gateway.md
      - "0012 — Audit log": adr/0012-audit-log.md
      - "0013 — Policy engine": adr/0013-policy-engine.md
      - "0014 — Trunk-based development": adr/0014-trunk-based-development.md
      - "0015 — Python toolchain": adr/0015-python-toolchain.md
      - "0016 — Package layout": adr/0016-package-layout.md
      - "0017 — Configuration": adr/0017-configuration.md
      - "0018 — Structured logging": adr/0018-structured-logging.md
      - "0019 — SQLite persistence": adr/0019-sqlite-persistence.md
      - "0020 — Memory retention TTL": adr/0020-memory-retention-ttl.md
      - "0021 — Dashboard (HTMX)": adr/0021-dashboard-htmx.md
      - "0022 — Backup and restore": adr/0022-backup-restore.md
      - "0023 — OpenTelemetry tracing": adr/0023-opentelemetry-tracing.md
      - "0024 — Documentation site": adr/0024-docs-site-mkdocs.md
      - "0025 — Security review process": adr/0025-security-review.md
      - "0026 — Multi-provider LLM gateway": adr/0026-multi-provider-llm-gateway.md
      - "0027 — NATS auth and multi-host Legion": adr/0027-nats-auth-multihost-legion.md
      - "0028 — Tools beyond HA": adr/0028-tools-beyond-ha.md
      - "0029 — Docker distribution + `caesar init`": adr/0029-docker-distribution-and-init.md
      - "0030 — Proactivity: schedules + ntfy.sh": adr/0030-proactivity-schedules-and-ntfy.md

validation:
  omitted_files: warn
  absolute_links: relative_to_docs
  unrecognized_links: warn

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Sinidious/CAESAR
