site_name: CAESAR
site_description: Self-hosted homelab AI assistant — Praetor brain + Legion of workers.
site_url: https://sinidious.github.io/caesar/
repo_url: https://github.com/sinidious/caesar
repo_name: sinidious/caesar
edit_uri: edit/main/docs/
copyright: PolyForm Noncommercial 1.0.0 — CAESAR contributors.

docs_dir: docs
strict: true

theme:
  name: material
  features:
    - content.code.copy
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Architecture: ARCHITECTURE.md
  - Roadmap: ROADMAP.md
  - Glossary: GLOSSARY.md
  - Security model: SECURITY-MODEL.md
  - Configuration: CONFIGURATION.md
  - ADRs:
      - Index: adr/README.md
