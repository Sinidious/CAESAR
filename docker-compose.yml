# CAESAR reference stack (ADR-0029).
#
# Workflow:
#   1. caesar init                  # writes .env, policy.yaml, praetor.nkey, ./var/
#   2. <edit .env to set your LLM API key>
#   3. docker compose up -d
#
# Running `docker compose up` BEFORE `caesar init` will silently
# create empty directories where the bind-mounted policy.yaml /
# praetor.nkey should be, and the container will fail to start.
# That's the safety check: init first, then bring the stack up.
#
# nats-server is opt-in for Legion workers: uncomment
# CAESAR_BUS__ENABLED=true in .env to use it. ollama / searxng
# services below are commented out as starting points for the
# fully-local / privacy-conscious operator.

services:
  caesar:
    image: ghcr.io/sinidious/caesar:latest
    container_name: caesar
    restart: unless-stopped
    env_file:
      # Generated by `caesar init`. required: false lets the operator
      # validate `docker compose config` before running init, and
      # supports flows that set env vars another way.
      - path: .env
        required: false
    volumes:
      - ./var:/var/lib/caesar/var
      - ./policy.yaml:/var/lib/caesar/policy.yaml:ro
      - ./praetor.nkey:/var/lib/caesar/praetor.nkey:ro
    ports:
      # Loopback bind on the host; flip to "8000:8000" when fronting
      # CAESAR with a reverse proxy on the same machine.
      - "127.0.0.1:8000:8000"
    depends_on:
      - nats
    networks:
      - caesar

  nats:
    image: nats:2.10-alpine
    container_name: caesar-nats
    restart: unless-stopped
    # Single-host posture: no auth, loopback only. For cross-host
    # workers, swap in your nats-server.conf with NKEYs per ADR-0027
    # and remove the `command`.
    command: ["-a", "0.0.0.0", "-p", "4222"]
    networks:
      - caesar

  # --- Optional services ----------------------------------------------------
  # Uncomment what you need. None of these are required for a baseline
  # CAESAR install; they unlock specific v1.1/v1.3 capabilities.

  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: caesar-ollama
  #   restart: unless-stopped
  #   volumes:
  #     - ollama-models:/root/.ollama
  #   ports:
  #     - "127.0.0.1:11434:11434"
  #   networks:
  #     - caesar
  #   # Then in .env:
  #   #   CAESAR_LLM__PROVIDER=ollama
  #   #   CAESAR_LLM__MODEL=llama3.1:8b-instruct
  #   #   CAESAR_LLM__OLLAMA__BASE_URL=http://ollama:11434

  # searxng:
  #   image: searxng/searxng:latest
  #   container_name: caesar-searxng
  #   restart: unless-stopped
  #   environment:
  #     - SEARXNG_BASE_URL=http://searxng:8080/
  #   volumes:
  #     - ./searxng:/etc/searxng:ro
  #   ports:
  #     - "127.0.0.1:8888:8080"
  #   networks:
  #     - caesar
  #   # Then in .env:
  #   #   CAESAR_LEGION__INPROCESS_WORKERS=["memory_recall","web_search"]
  #   #   CAESAR_TOOLS__WEB_SEARCH__SEARXNG_URL=http://searxng:8080

networks:
  caesar:
    name: caesar

