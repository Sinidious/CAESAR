# CAESAR multi-host Legion — reference nats-server.conf (ADR-0027).
#
# Authorise Praetor (the brain) and one named worker via NKEYs, with
# per-identity subject permissions. Copy + edit for your topology:
#   - Replace the public keys with the values printed by
#     `caesar legion new-worker --name <name>`.
#   - Praetor's NKEY is minted the same way (use `--name praetor`
#     and treat the returned identity as the orchestrator).
#   - Subject globs assume the conventions baked into CAESAR's
#     registry / dispatch (caesar.registry.*, caesar.dispatch.<cap>,
#     caesar.reply.<worker-name>.>).
#
# Listening on 4222 plaintext is fine on a trusted LAN. For
# untrusted networks, layer TLS on top (see the `tls` block at the
# bottom of this file).

port: 4222
http_port: 8222    # /healthz, /varz, /connz — bind on loopback only

authorization {
  users: [
    # === Praetor — the orchestrator ===
    { user: "caesar-praetor", nkey: "UABCDEFGHIJKLMNOPQRSTUVWXYZ234567ABCDEFGHIJKLMNOPQRSTUVWXYZ234567",
      permissions: {
        publish: { allow: ["caesar.>"] },
        subscribe: { allow: ["caesar.>"] },
      },
    },

    # === Worker — one identity per host running a Legion worker ===
    # Re-run `caesar legion new-worker --name kitchen-pi` for each
    # additional worker; the block below is one example.
    { user: "caesar-worker-kitchen-pi", nkey: "UWXYZ234567ABCDEFGHIJKLMNOPQRSTUVWXYZ234567ABCDEFGHIJKLMNOPQR",
      permissions: {
        # Workers tell Praetor they exist and ship heartbeats; they
        # also publish replies on their own private subtree.
        publish: {
          allow: [
            "caesar.registry.hello",
            "caesar.registry.heartbeat",
            "caesar.reply.kitchen-pi.>",
          ],
        },
        # Workers subscribe to capability dispatches and the replies
        # destined for them. They CANNOT subscribe to other workers'
        # reply subtrees.
        subscribe: {
          allow: [
            "caesar.dispatch.>",
            "caesar.reply.kitchen-pi.>",
          ],
        },
      },
    },
  ]
}

# Optional: enable TLS when crossing untrusted networks.
# Generate certs externally; nats-server doesn't issue them.
#
# tls {
#   cert_file: "/etc/nats/server.crt"
#   key_file:  "/etc/nats/server.key"
#   verify:    true     # require mutual TLS
#   ca_file:   "/etc/nats/ca.crt"
# }
