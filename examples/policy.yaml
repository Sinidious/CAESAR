# CAESAR policy rules — example (ADR-0013).
#
# Point CAESAR_POLICY__RULES_PATH at this file (or a copy) to enable
# the allow-list policy. With no rules file set, CAESAR runs the
# deny-all stub and refuses every service call.
#
# Schema (v1):
#   version: 1
#   allowed_services: a list of allow-list entries. Two forms accepted:
#
#     - "domain.service"             # bare string: any params allowed
#     - service: "domain.service"    # object form: pin entity_id
#       target:
#         entity_id: [entity, ...]
#
#     Bare-string entries stay backward compatible. Object entries
#     constrain target.entity_id (SR-005) so a prompt-injected
#     "turn off every light" can't slip past the allow-list.
#     Multiple entries for the same service union together (OR).
#
# Other target fields (device_id, area_id), the `data` payload, and
# `require_confirm` verdicts are planned for a follow-up.

version: 1
allowed_services:
  # Bare-string entries: any params allowed.
  - light.turn_on
  - light.toggle
  - switch.turn_on
  - switch.turn_off
  - switch.toggle
  - homeassistant.check_config

  # Constrained entry (SR-005): light.turn_off is only allowed for
  # specific lights. A call asking for `entity_id: [light.everything]`
  # would be denied.
  - service: light.turn_off
    target:
      entity_id:
        - light.kitchen
        - light.living_room
